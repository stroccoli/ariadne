name: Deploy Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest

      - name: Run unit tests
        run: pytest tests/unit -v
        env:
          VECTOR_STORE: none
          LLM_PROVIDER: openai
          OPENAI_API_KEY: fake-key-for-unit-tests

  deploy-backend:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --config infra/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  smoke-test:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 15

      - name: Health check
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' https://ariadne-api.fly.dev/health)
          if [ "$status" != "200" ]; then
            echo "Health check failed with status $status"
            exit 1
          fi
          echo "Health check passed"

      - name: Ready check
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' https://ariadne-api.fly.dev/ready)
          if [ "$status" != "200" ]; then
            echo "Ready check failed with status $status"
            exit 1
          fi
          echo "Ready check passed"
