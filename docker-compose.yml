services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: ariadne-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./.qdrant/storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: ariadne-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./.redis/data:/data
    command: redis-server --appendonly yes